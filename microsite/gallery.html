<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery — Petit Jean State Park</title>
  <meta name="description" content="Browse photos of Petit Jean State Park — Cedar Falls, wildlife, hiking trails, fall foliage, and every season on the mountain.">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/gallery.css">
</head>
<body>
 
  <!-- ══ SITE HEADER ════════════════════════════ -->
  <header class="site-header" role="banner">
    <a href="index.html" class="site-header__logo" aria-label="Petit Jean State Park — home">
      <img src="assets/img/nps-logo.png" alt="National Park Service arrowhead logo" width="46">
      <hgroup>
        <h1>Petit Jean State Park</h1>
        <p>Arkansas' First State Park</p>
      </hgroup>
    </a>
    <button class="nav-toggle" aria-controls="primary-nav" aria-expanded="false" aria-label="Toggle navigation menu">
      <span></span><span></span><span></span>
    </button>
    <nav id="primary-nav" class="primary-nav" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="history.html">History</a>
      <a href="things-to-do.html">Things To Do</a>
      <a href="trails.html">Trails</a>
      <a href="gallery.html">Gallery</a>
      <a href="visitor-info.html">Visitor Info</a>
      <a href="weather.html">Weather</a>
    </nav>
  </header>
 
  <!-- ══ PAGE HERO ══════════════════════════════ -->
  <div class="page-hero" role="img" aria-label="Cedar Falls waterfall in autumn">
    <div class="page-hero__bg gallery-hero__bg" aria-hidden="true"></div>
    <div class="page-hero__overlay" aria-hidden="true"></div>
    <div class="page-hero__content">
      <p>Through the Lens</p>
      <h1>Photo Gallery</h1>
    </div>
  </div>
 
  <!-- ══ MAIN CONTENT ═══════════════════════════ -->
  <main id="main-content" class="page-content">
 
    <section aria-labelledby="gallery-heading">
 
      <div class="reveal">
        <p class="label" aria-hidden="true">The Park in Photos</p>
        <h2 id="gallery-heading" class="section-title">Every Season, Every Trail</h2>
      </div>
 
      <!-- Filter controls -->
      <fieldset class="filter-group reveal" aria-controls="photo-grid">
        <legend>Filter photos by category</legend>
        <ul role="list">
          <li><button data-filter="all"       aria-pressed="true">All</button></li>
          <li><button data-filter="waterfall" aria-pressed="false">Waterfalls</button></li>
          <li><button data-filter="wildlife"  aria-pressed="false">Wildlife</button></li>
          <li><button data-filter="trails"    aria-pressed="false">Trails</button></li>
          <li><button data-filter="scenic"    aria-pressed="false">Scenic</button></li>
          <li><button data-filter="seasons"   aria-pressed="false">Seasons</button></li>
        </ul>
      </fieldset>
 
      <!--
        Gallery: <ul> of <li><figure>.
        Each <figure> contains the photo and a <figcaption>.
        tabindex="0" allows keyboard navigation to open the lightbox.
        data-src stores the full-res URL for the lightbox.
      -->
      <ul id="photo-grid" class="photo-grid reveal" role="list">
 
        <li data-cat="waterfall">
          <figure class="photo-card"
                  tabindex="0"
                  role="button"
                  aria-label="View full size: Cedar Falls — The Crown Jewel"
                  data-src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=85"
                  data-cap="Cedar Falls — The Crown Jewel">
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=75"
                 alt="Cedar Falls waterfall cascading 95 feet into a boulder-lined pool"
                 width="600" loading="lazy">
            <figcaption>
              <strong>Cedar Falls</strong>
              <p>Arkansas' most photographed waterfall</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="scenic">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: Valley Overlook at Dawn"
                  data-src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1200&q=85"
                  data-cap="Valley Overlook at Dawn">
            <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&q=75"
                 alt="Aerial view of a forested valley at sunrise"
                 width="600" loading="lazy">
            <figcaption>
              <strong>Valley Overlook</strong>
              <p>Arkansas River Valley from the bluffs</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="wildlife">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: White-tailed Deer at Dusk"
                  data-src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=1200&q=85"
                  data-cap="White-tailed Deer at Dusk">
            <img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=600&q=75"
                 alt="White-tailed deer grazing in a forest clearing at dusk"
                 width="600" loading="lazy">
            <figcaption>
              <strong>White-tailed Deer</strong>
              <p>Common in the park at dawn and dusk</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="trails">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: Forest Trail Through the Cedars"
                  data-src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200&q=85"
                  data-cap="Forest Trail Through the Cedars">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&q=75"
                 alt="A sunlit trail disappearing into a dense cedar forest"
                 width="600" loading="lazy">
            <figcaption>
              <strong>Cedar Forest Trail</strong>
              <p>20+ miles of marked trails</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="seasons">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: Fall Foliage on Petit Jean Mountain"
                  data-src="https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=1200&q=85"
                  data-cap="Fall Foliage on Petit Jean Mountain">
            <img src="https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=600&q=75"
                 alt="Vivid orange and red fall foliage on a mountain hillside"
                 width="600" loading="lazy">
            <figcaption>
              <strong>Fall Color</strong>
              <p>Peak foliage mid-to-late October</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="scenic">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: Bluff Overlook at Sunrise"
                  data-src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200&q=85"
                  data-cap="Bluff Overlook at Sunrise">
            <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=75"
                 alt="Rocky mountain bluff overlooking a misty valley at sunrise"
                 width="600" loading="lazy">
            <figcaption>
              <strong>East Bluff Overlook</strong>
              <p>Best sunrise spot in the park</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="waterfall">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: Cedar Falls in Winter Ice"
                  data-src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=1200&q=85"
                  data-cap="Cedar Falls — Winter Ice">
            <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=600&q=75"
                 alt="A frozen waterfall with ice formations in winter"
                 width="600" loading="lazy">
            <figcaption>
              <strong>Winter Cedar Falls</strong>
              <p>The falls can freeze in January</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="wildlife">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: Bald Eagle Over Lake Bailey"
                  data-src="https://images.unsplash.com/photo-1444464666168-49d633b86797?w=1200&q=85"
                  data-cap="Bald Eagle Over Lake Bailey">
            <img src="https://images.unsplash.com/photo-1444464666168-49d633b86797?w=600&q=75"
                 alt="A bald eagle soaring in flight against a blue sky"
                 width="600" loading="lazy">
            <figcaption>
              <strong>Bald Eagle</strong>
              <p>Winter visitors to Lake Bailey</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="seasons">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: Spring Wildflowers on the Mountain"
                  data-src="https://images.unsplash.com/photo-1462275646964-a0e3386b89fa?w=1200&q=85"
                  data-cap="Spring Wildflowers on the Mountain">
            <img src="https://images.unsplash.com/photo-1462275646964-a0e3386b89fa?w=600&q=75"
                 alt="Purple and white wildflowers blooming on a forest floor"
                 width="600" loading="lazy">
            <figcaption>
              <strong>Spring Bloom</strong>
              <p>Wildflowers carpet the forest floor in April</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="scenic">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: Native American Rock Art Bluffs"
                  data-src="https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=1200&q=85"
                  data-cap="Native American Rock Art Bluffs">
            <img src="https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=600&q=75"
                 alt="Ancient petroglyphs carved into sandstone bluff walls"
                 width="600" loading="lazy">
            <figcaption>
              <strong>Ancient Rock Art</strong>
              <p>2,000-year-old petroglyphs</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="scenic">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: Storm Approaching the Mountain"
                  data-src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=1200&q=85"
                  data-cap="Storm Approaching the Mountain">
            <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=600&q=75"
                 alt="Dark storm clouds building above a forested mountain ridge"
                 width="600" loading="lazy">
            <figcaption>
              <strong>Storm Season</strong>
              <p>Dramatic skies above the Arkansas ridge</p>
            </figcaption>
          </figure>
        </li>
 
        <li data-cat="trails">
          <figure class="photo-card"
                  tabindex="0" role="button"
                  aria-label="View full size: Hiking the Canyon Trail"
                  data-src="https://images.unsplash.com/photo-1547489432-cf93fa6c71ee?w=1200&q=85"
                  data-cap="Hiking the Canyon Trail">
            <img src="https://images.unsplash.com/photo-1547489432-cf93fa6c71ee?w=600&q=75"
                 alt="A hiker descending a rocky switchback trail into a deep canyon"
                 width="600" loading="lazy">
            <figcaption>
              <strong>Canyon Trail</strong>
              <p>The park's most strenuous route</p>
            </figcaption>
          </figure>
        </li>
 
      </ul>
    </section>
 
  </main>
 
  <!--
    Lightbox: native <dialog> element.
    - showModal() / close() are built-in.
    - Escape key is handled natively by the browser.
    - aria-modal and aria-labelledby connect to screen readers.
  -->
  <dialog class="lightbox" aria-modal="true" aria-labelledby="lightbox-caption">
    <button class="close-btn" aria-label="Close photo lightbox">✕</button>
    <img src="" alt="" id="lightboxImg">
    <figcaption id="lightbox-caption"></figcaption>
  </dialog>
 
  <!-- ══ FOOTER ═════════════════════════════════ -->
  <footer class="site-footer">
    <p>
      © 2025 Petit Jean State Park ·
      <a href="https://www.arkansasstateparks.com/parks/petit-jean-state-park"
         target="_blank" rel="noopener noreferrer">Arkansas State Parks</a>
    </p>
  </footer>
 
  <script src="assets/js/main.js"></script>
  <script src="assets/js/gallery.js"></script>
 
</body>
</html>
